app = "ppis-whatsapp-bot"
primary_region = "sin"

[mounts]
source = "ppis_data"
destination = "/data"

[http_service]
internal_port = 8000
force_https = false
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1

[checks]
[checks.alive]
port = 8000
type = "tcp"
interval = "30s"
timeout = "5s"

[build]
